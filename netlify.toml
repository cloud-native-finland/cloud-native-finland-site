[build]
publish = "public"
command = "make production-build"
ignore = "exit 1"

[build.environment]
HUGO_VERSION = "0.127.0"

[context.production.environment]
HUGO_ENV = "production"

[context.deploy-preview.environment]
HUGO_ENV = "preview"

[context.deploy-preview]
command = "make preview-build"

[context.branch-deploy]
command = "make preview-build"